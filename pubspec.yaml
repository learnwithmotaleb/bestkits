name: bestkits
description: "Production Ready Flutter App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Core
  get: ^4.7.2
  get_it: ^9.2.1
  go_router: ^17.2.3

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  gap: ^3.0.1

  # Network
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.20.2
  logger: ^2.6.2

  # Image
  cached_network_image: ^3.4.1
  internet_connection_checker_plus: ^3.0.0
  socket_io_client: ^3.1.4
  device_preview: ^1.3.1
  flutter_spinkit: ^5.2.2
  share_plus: ^13.1.0
  url_launcher: ^6.3.2
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.4
  pin_code_fields: ^9.3.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.2.2
  flutter_html: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_gen_runner:
  build_runner:
  hive_generator: ^2.0.0


flutter_gen:
  output: lib/gen/

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Italic.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Italic.ttf
          weight: 700
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600